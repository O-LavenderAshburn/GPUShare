<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#111827"/>
  <g transform="translate(256,256)">
    <!-- GPU chip body -->
    <rect x="-96" y="-96" width="192" height="192" rx="24" fill="#3B82F6" opacity="0.9"/>
    <!-- Inner chip -->
    <rect x="-64" y="-64" width="128" height="128" rx="12" fill="#1E40AF"/>
    <!-- Chip pins - top -->
    <rect x="-72" y="-120" width="16" height="32" rx="4" fill="#6B7280"/>
    <rect x="-36" y="-120" width="16" height="32" rx="4" fill="#6B7280"/>
    <rect x="0" y="-120" width="16" height="32" rx="4" fill="#6B7280"/>
    <rect x="36" y="-120" width="16" height="32" rx="4" fill="#6B7280"/>
    <!-- Chip pins - bottom -->
    <rect x="-72" y="88" width="16" height="32" rx="4" fill="#6B7280"/>
    <rect x="-36" y="88" width="16" height="32" rx="4" fill="#6B7280"/>
    <rect x="0" y="88" width="16" height="32" rx="4" fill="#6B7280"/>
    <rect x="36" y="88" width="16" height="32" rx="4" fill="#6B7280"/>
    <!-- Chip pins - left -->
    <rect x="-120" y="-72" width="32" height="16" rx="4" fill="#6B7280"/>
    <rect x="-120" y="-36" width="32" height="16" rx="4" fill="#6B7280"/>
    <rect x="-120" y="0" width="32" height="16" rx="4" fill="#6B7280"/>
    <rect x="-120" y="36" width="32" height="16" rx="4" fill="#6B7280"/>
    <!-- Chip pins - right -->
    <rect x="88" y="-72" width="32" height="16" rx="4" fill="#6B7280"/>
    <rect x="88" y="-36" width="32" height="16" rx="4" fill="#6B7280"/>
    <rect x="88" y="0" width="32" height="16" rx="4" fill="#6B7280"/>
    <rect x="88" y="36" width="32" height="16" rx="4" fill="#6B7280"/>
    <!-- GPU text -->
    <text x="0" y="12" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-weight="700" font-size="48">GPU</text>
  </g>
</svg>
