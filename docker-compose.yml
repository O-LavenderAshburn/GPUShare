services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - render-tmp:/tmp/renders
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  render-worker:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    command: python -m app.workers.render_worker
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - render-tmp:/tmp/renders
    depends_on:
      - fastapi
    restart: unless-stopped

  celery-worker:
    build:
      context: ./packages/server
      dockerfile: Dockerfile.celery
    env_file: .env
    depends_on:
      fastapi:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Cloudflare Tunnel — two modes:
  #   With TUNNEL_TOKEN set in .env: uses your configured tunnel + domain
  #   Without TUNNEL_TOKEN: run `cloudflared tunnel --url http://localhost:8000`
  #     separately to get a free trycloudflare.com URL (no account needed)
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run --token ${TUNNEL_TOKEN}
    network_mode: host
    volumes:
      - ./cloudflared.yml:/etc/cloudflared/config.yml:ro
    depends_on:
      fastapi:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  render-tmp:
  redis-data:
